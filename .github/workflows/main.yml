name: Build SingleSweep

on:
  push:
    tags:
      - 'v*'                 # only build on version tags (e.g. v1.0.0)
  workflow_dispatch:         # allow manual build anytime from GitHub UI
    inputs:
      version:
        description: 'Version label for this build'
        required: false
        default: 'manual'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'       # cache pip packages
          cache-dependency-path: 'requirements.in'

      - name: Compile requirements for Windows
        run: |
          pip install pip-tools
          pip-compile requirements.in --output-file requirements.txt
      
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build SingleSweep
        run: >
          pyinstaller 
          --onefile
          --collect-all dash
          --name SingleSweep
          main_single.py
          
      - name: Get short SHA
        shell: bash
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SingleSweep-${{ github.ref_name }}-${{ env.SHORT_SHA }}
          path: dist/*.exe
