name: Build Sweeps

on:
  push:
    tags:
      - 'v*'                 # only build on version tags (e.g. v1.0.0)
  workflow_dispatch:         # allow manual build anytime from GitHub UI
    inputs:
      version:
        description: 'Version label for this build'
        required: false
        default: 'manual'

jobs:
  build-windows:
    runs-on: windows-2025-vs2026
    permissions:
      contents: write          # ← required for creating releases
      
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'       # cache pip packages
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build WavelengthSweep
        run: >
          pyinstaller 
          --onedir
          --collect-all dash
          --collect-all plotly
          --name WavelengthSweep
          main_sweep.py
      
      - name: Build RefSweep
        run: >
          pyinstaller 
          --onedir
          --collect-all dash
          --collect-all plotly
          --name RefSweep
          main_reference.py
      
      - name: Build PlotSweep
        run: >
          pyinstaller 
          --onedir
          --collect-all dash
          --collect-all plotly
          --name PlotSweep
          plot_csv.py

      - name: Verify builds
        shell: bash
        run: |
          for exe in dist/WavelengthSweep/WavelengthSweep.exe dist/RefSweep/RefSweep.exe dist/PlotSweep/PlotSweep.exe; do
            if [ ! -f "$exe" ]; then
              echo "ERROR: $exe not found"
              exit 1
            fi
            echo "OK: $exe ($(du -h $exe | cut -f1))"
          done

      - name: Get short SHA
        shell: bash
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Zip builds   # ← onedir produces folders; bundle all three into one zip
        shell: bash
        run: |
          cd dist
          7z a "Sweeps-${SHORT_SHA}.zip" WavelengthSweep RefSweep PlotSweep

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Sweeps-${{ github.event.inputs.version || github.ref_name }}-${{ env.SHORT_SHA }}
          path: dist/*.zip          

      - name: Create GitHub Release   # ← new step
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')   # only on tag pushes
        with:
          files: dist/*.zip
          generate_release_notes: true   # auto-generates notes from commits
          draft: true